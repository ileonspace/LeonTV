<!DOCTYPE html>
<!-- LeonTV v4.7.1 — 2026-06-23 滑动切换分类 + 版本面板 -->
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LeonTV</title>
<script>fetch('https://tj.yun.bar/api/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({site_id:'LeonTV',path:window.location.pathname})}).catch(e=>{});</script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.14/dist/hls.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{--bg:#EAF3F7;--card:#fff;--text:#1A2332;--text2:#5A6B7A;--text3:#8A9BAA;--border:#D5E3EC;--accent:#0066CC;--green:#34c759;--red:#ff3b30;--ep-bg:#DEE9F0;--ep-hover:#CDDCE8;--radius:12px}
[data-theme="dark"]{--bg:#1c1c1e;--card:#2c2c2e;--text:#f5f5f7;--text2:#98989d;--text3:#636366;--border:#38383a;--accent:#0a84ff;--green:#30d158;--red:#ff453a;--ep-bg:#1a2540;--ep-hover:#253558}
*{margin:0;padding:0;box-sizing:border-box}
svg.lucide{width:1em;height:1em;stroke-width:2;vertical-align:-.15em;flex-shrink:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
.header{height:56px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);backdrop-filter:blur(20px)}
[data-theme="light"] .header{background:rgba(218,232,240,.9)}[data-theme="dark"] .header{background:rgba(44,44,46,.8)}
.header-logo{font-size:22px;font-weight:700}.header-logo span{color:#FF8C00}
.header-right{display:flex;align-items:center;gap:6px}
.icon-btn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.icon-btn:hover{background:var(--border)}
.site-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:12px;background:rgba(52,199,89,.15);color:var(--green)}
.main{max-width:900px;margin:0 auto;padding:20px;width:100%}
.search-box{display:flex;gap:10px;margin-bottom:16px;position:relative}
.search-input{flex:1;height:46px;padding:0 16px;border-radius:23px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:15px;outline:none}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.12)}
.search-input::placeholder{color:var(--text3)}
.btn{height:46px;padding:0 24px;border-radius:23px;border:none;font-size:15px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff;white-space:nowrap;flex-shrink:0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;font-size:13px;color:var(--text2);min-height:20px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.status-dot.ok{background:var(--green)}.status-dot.err{background:var(--red)}
.lock-banner{text-align:center;padding:40px 20px;color:var(--text2);display:none}
.loading-box{text-align:center;padding:60px 20px;color:var(--text2);display:none}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-box{text-align:center;padding:80px 20px;color:var(--text2);display:block}
.cat-bar{display:flex;gap:10px;margin-bottom:16px;align-items:center;overflow:visible}
.cat-nav{display:flex;gap:8px;overflow-x:auto;padding:7px 0 4px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;min-width:0}
.cat-nav::-webkit-scrollbar{display:none}
.region-select{padding:5px 10px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;cursor:pointer;outline:none;flex-shrink:0}
.region-select.active{background:var(--ep-bg);font-weight:700}
.cat-active-label{font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap;flex-shrink:0;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.cat-pill{flex-shrink:0;padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;line-height:1.4}
.cat-pill:hover{border-color:var(--accent);color:var(--accent)}
.cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-pill.drag-over{border-color:var(--accent);transform:scale(1.05)}
.cat-pill.dragging{opacity:.4}
.cat-pill-add{background:transparent;border-style:dashed;color:var(--text3)}
.cat-pill-add:hover{color:var(--accent);border-color:var(--accent)}
.cat-pill-home{background:#FF8C00!important;color:#fff!important;border-color:#FF8C00!important;font-weight:700}
.cat-pill-home:hover{opacity:.85;color:#fff!important;border-color:#FF8C00!important}
.cat-pill-del{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;font-size:10px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.cat-pill.custom:hover .cat-pill-del{display:flex}
.cat-pill.custom{position:relative}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.cat-card{border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s;background:var(--card);border:1px solid var(--border)}
.cat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.cat-card-img{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--border);display:block}
.cat-card-noposter{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--ep-bg),var(--border));color:var(--text3)}
.cat-card-noposter .lucide{width:32px;height:32px;opacity:.5}
.cat-card-info{padding:8px 10px 10px}
.cat-card-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.cat-card-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.cat-card-rating{font-weight:700;color:#E6A000}
.cat-more{grid-column:1/-1;display:flex;align-items:center;justify-content:center;min-height:60px;color:var(--text3);font-size:13px;cursor:pointer;border-radius:10px;border:2px dashed var(--border);transition:all .2s}
.cat-more:hover{border-color:var(--accent);color:var(--accent)}
/* 分类滑动切换 */
.results-area.swiping{transition:none!important}
.results-area.snap-back{transition:transform .25s ease-out!important;transform:translateX(0)}
.results-area.snap-next{transition:transform .25s ease-out!important}
.swipe-indicator{position:fixed;top:50%;transform:translateY(-50%);z-index:150;font-size:28px;color:var(--accent);opacity:0;pointer-events:none;transition:opacity .15s}
.movie-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.movie-top{display:flex;gap:12px;margin-bottom:10px}
.poster-wrap{position:relative;flex-shrink:0;width:160px;height:224px}
.movie-poster{width:100%;height:100%;border-radius:9px;object-fit:cover;background:var(--border);display:block}
.poster-fb{display:flex;align-items:center;justify-content:center;color:var(--text3)}
.poster-fb .lucide{width:44px;height:44px}
.poster-rating{position:absolute;bottom:8px;right:8px;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#F5C518,#E6A000);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:2;letter-spacing:-.5px}
.poster-rating.wide{width:auto;padding:0 7px;border-radius:17px}
.poster-lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;cursor:pointer}
.poster-lightbox.open{display:flex}
.poster-lightbox img{max-width:92vw;max-height:92vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5);object-fit:contain}
.poster-lightbox .pl-close{position:absolute;top:16px;right:20px;width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.poster-lightbox .pl-close:hover{background:rgba(255,255,255,.3)}
.movie-info{flex:1;min-width:0;overflow:hidden;word-break:break-all}
.movie-title{font-size:16px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.movie-meta{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;flex-wrap:wrap;gap:2px 10px}
.movie-summary{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ep-count-badge{font-weight:700;color:var(--accent)}
.src-count{color:var(--text2)}
.fast-badge{color:var(--green);font-weight:600}
.tmdb-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#fff;background:linear-gradient(135deg,#F5C518,#E6A000);padding:3px 10px;border-radius:20px;margin-left:6px;vertical-align:middle;white-space:nowrap;box-shadow:0 1px 3px rgba(245,197,24,.25)}
.douban-link{display:inline-block;font-size:11px;font-weight:600;color:#fff;background:#07a046;padding:2px 8px;border-radius:20px;text-decoration:none;vertical-align:middle;margin-left:4px;white-space:nowrap;transition:all .15s}
.douban-link:hover{background:#0ab853;box-shadow:0 1px 4px rgba(7,160,70,.35)}
.douban-link:visited{color:#fff}
.scroll-top-btn{position:fixed;bottom:80px;right:24px;z-index:150;width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:20px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,102,204,.3);transition:all .2s}
.scroll-top-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,102,204,.45)}
.scroll-top-btn.show{display:flex}
.ep-section{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.ep-section-title{font-size:12px;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ep-reverse-btn{font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap}
.ep-reverse-btn:hover{border-color:var(--accent);color:var(--accent)}
.ep-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:220px;overflow-y:auto;align-content:flex-start;padding-right:4px}
.ep-grid::-webkit-scrollbar{width:4px}
.ep-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ep-btn{min-width:42px;height:32px;padding:0 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
.ep-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--ep-bg)}
.ep-btn.now{border-color:var(--accent);background:var(--accent);color:#fff}
.src-select-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px;color:var(--text3)}
.history-drop{display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px 10px;margin-top:2px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.history-pills-wrap{display:flex;flex-wrap:wrap;gap:6px;max-height:106px;overflow-y:auto;padding:6px}
.history-section-divider{height:1px;background:var(--border);margin:4px 0}
.history-pill{position:relative;display:inline-flex;align-items:center;padding:4px 18px 4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--bg);font-size:12px;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .12s}
.history-pill:hover{border-color:var(--accent);color:var(--accent)}
.history-pill .hx{position:absolute;top:-5px;right:-5px;width:15px;height:15px;border-radius:50%;background:var(--text3);color:#fff;font-size:9px;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.history-pill:hover .hx{display:flex}
.history-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.history-head span{font-size:11px;color:var(--text3)}
.history-clear-btn{font-size:11px;background:none;border:none;color:var(--text3);cursor:pointer}
.history-clear-btn:hover{color:var(--red)}
.src-select-row select{font-size:11px;padding:3px 6px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);max-width:200px}
.login-overlay{position:fixed;inset:0;z-index:400;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.login-overlay.hidden{display:none}
.login-title{font-size:24px;font-weight:700;color:var(--text)}.login-title span{color:var(--accent)}
.login-input{width:220px;height:46px;padding:0 16px;border-radius:23px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:15px;outline:none;text-align:center}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.12)}
.login-msg{font-size:12px;color:var(--red);height:16px}
.player-overlay{position:fixed;inset:0;z-index:300;background:rgba(234,243,247,.96);display:none;align-items:center;justify-content:center;flex-direction:column;transition:background .3s}
.player-overlay.open{display:flex}
.player-overlay.cinema{background:rgba(0,0,0,.95)}
.player-wrap{width:92%;max-width:1000px;background:#fff;border-radius:8px;overflow:hidden;position:relative;transition:background .3s;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.player-overlay.cinema .player-wrap{background:#111}
.player-bar{position:absolute;top:6px;right:56px;z-index:10;display:flex;gap:10px}
.player-close,.player-cinema-btn{width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.25);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;backdrop-filter:blur(4px)}
.player-close:hover,.player-cinema-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.player-overlay.cinema .player-close,.player-overlay.cinema .player-cinema-btn{background:rgba(255,255,255,.12);color:#eee}
.player-overlay.cinema .player-close:hover,.player-overlay.cinema .player-cinema-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.player-video{width:100%;height:auto;aspect-ratio:16/9;display:block;max-height:70vh;background:#000}
.player-info{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#DCE4EA;color:#5A6B7A;font-size:12px;flex-wrap:wrap;gap:8px;border-top:1px solid #D5E3EC;transition:background .3s,color .3s,border-color .3s}
.player-overlay.cinema .player-info{background:#1a1a1a;color:#ccc;border-top-color:#333}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:90%;max-width:500px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden}
.modal-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px 20px}
.modal-tabs{display:flex;margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.modal-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--text2);border:none;display:flex;align-items:center;justify-content:center;gap:4px}
.modal-tab.active{background:var(--accent);color:#fff}
.modal-tab:not(:last-child){border-right:1px solid var(--border)}
.modal .form-group{margin-bottom:12px}
.modal label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text2)}
.modal input,.modal textarea{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;outline:none}
.modal textarea{height:120px;resize:vertical;font-size:12px}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal .hint{font-size:11px;color:var(--text3);margin:6px 0 8px 0}
.modal .msg{font-size:13px;margin:12px 0;padding:8px 12px;border-radius:6px;display:none}
.modal .msg.ok{display:block;background:rgba(52,199,89,.1);color:var(--green)}
.modal .msg.err{display:block;background:rgba(255,59,48,.1);color:var(--red)}
.modal .msg.loading{display:flex;align-items:center;gap:8px;background:rgba(0,102,204,.08);color:var(--accent);font-weight:500}
/* 版本信息 */
.version-info{margin-bottom:14px;padding:8px 12px;border-radius:10px;background:var(--bg);border:1px solid var(--border);cursor:pointer;user-select:none}
.version-info:hover{border-color:var(--accent)}
.version-row{display:flex;align-items:center;gap:8px}
.version-badge{display:inline-block;padding:3px 12px;border-radius:12px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
.version-status{font-size:11px;color:var(--green);font-weight:600;flex-shrink:0}
.version-link{font-size:11px;color:var(--accent);text-decoration:none;font-weight:500;margin-left:auto;flex-shrink:0}
.version-link:hover{text-decoration:underline}
.version-arrow{font-size:10px;color:var(--text3);flex-shrink:0}
.cl-list{margin-top:8px;padding-top:6px;border-top:1px solid var(--border);background:transparent}
.cl-item{padding:5px 0;border-bottom:1px solid var(--border);background:transparent}
.cl-item:last-child{border-bottom:none}
.cl-item-head{font-weight:600;color:var(--text);margin-bottom:2px;font-size:12px}
.cl-item-body{font-size:11px;color:var(--text2);line-height:1.5}
.import-spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.site-footer{text-align:center;padding:40px 20px 30px;color:var(--text3);font-size:11px;line-height:1.8;max-width:900px;margin:0 auto;opacity:.7}
.results-header{font-size:13px;color:var(--text2);margin-bottom:12px;text-align:center}
.results-header b{color:var(--text)}
@media(max-width:768px){
  .header{height:50px;padding:0 12px}.header-logo{font-size:21px}.main{padding:10px}
  .search-box{gap:8px;margin-bottom:8px}.search-input{font-size:16px;height:46px;padding:0 14px}
  .btn{height:46px;padding:0 20px;font-size:15px}
  .cat-bar{gap:6px;margin-bottom:10px}.cat-pill{padding:6px 12px;font-size:14px}
  .region-select{padding:6px 10px;font-size:13px}
  .status-bar{font-size:13px}.results-header{font-size:14px}
  .poster-wrap{width:110px;height:154px}.poster-rating{width:26px;height:26px;font-size:11px}
  .movie-title{font-size:17px}.movie-meta{font-size:14px}.movie-summary{font-size:14px}
  .movie-card{padding:12px;margin-bottom:10px}
  .ep-btn{min-width:40px;height:36px;font-size:13px;padding:0 10px}.ep-grid{max-height:220px;gap:5px}
  .cat-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .cat-card-title{font-size:14px}.cat-card-info{padding:8px}.cat-card-meta{font-size:12px}
  .player-video{max-height:50vh}.player-info{padding:8px 12px;font-size:13px}
  .modal{width:94%}.modal-header h3{font-size:17px}.modal-body{padding:14px}
  .modal .btn{height:40px;border-radius:8px}
  .lock-banner p{font-size:16px!important}.site-footer{font-size:12px;padding-top:160px;padding-bottom:12px}
  .history-pill{font-size:13px;padding:5px 20px 5px 12px}.history-drop{padding:10px 12px}
.scroll-top-btn{bottom:80px;right:16px;width:40px;height:40px;font-size:18px}
}
@media(max-width:480px){
  .header{height:46px;padding:0 8px}.header-logo{font-size:18px}
  .icon-btn{width:38px;height:38px}.main{padding:6px}
  .search-box{gap:6px;margin-bottom:6px}.search-input{font-size:16px;height:44px;padding:0 12px}

<script>
// ========== LOGIN ==========
(function(){
  var a=localStorage.getItem('ms-auth');
  if(a&&Date.now()-parseInt(a)<7*24*3600*1000) document.getElementById('loginOverlay').classList.add('hidden');
})();
async function doLogin(){
  var v=document.getElementById('loginInput').value;
  if(!v) return;
  // 设cookie让服务端验证 — LOGIN_PASSWORD环境变量控制
  document.cookie='ltv_auth='+encodeURIComponent(v)+';path=/;max-age=604800';
  try{
    var r=await fetch('/api/sites');
    if(!r.ok){document.getElementById('loginMsg').textContent='密码错误';document.cookie='ltv_auth=;max-age=0';return;}
    localStorage.setItem('ms-auth',Date.now());
    localStorage.setItem('ms-login-pwd',v);
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('loginMsg').textContent='';
  }catch(e){document.getElementById('loginMsg').textContent='服务不可用';}
}

// ========== THEME ==========
(function(){
  var t=localStorage.getItem('ms-theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').innerHTML = t==='dark'?'<i data-lucide="moon"></i>':'<i data-lucide="sun"></i>';
  lucide.createIcons();
})();
function toggleTheme(){
  var t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').innerHTML = t==='dark'?'<i data-lucide="moon"></i>':'<i data-lucide="sun"></i>';
  // 浅色主题自动退出影院模式
  if(t==='light'){cinemaMode=false;localStorage.setItem('ms-cinema','0');applyCinema();}
  lucide.createIcons();localStorage.setItem('ms-theme',t);
}

// ========== SETTINGS ==========
function openSettings(){document.getElementById('settingsModal').classList.add('open');}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open');}
function switchTab(t){
  document.getElementById('tabUrl').classList.toggle('active',t==='url');
  document.getElementById('tabJson').classList.toggle('active',t==='json');
  document.getElementById('panelUrl').style.display=t==='url'?'block':'none';
  document.getElementById('panelJson').style.display=t==='json'?'block':'none';
  document.getElementById('settingsMsg').className='msg';
}
function smsg(type,txt){var e=document.getElementById('settingsMsg');e.textContent=txt;e.className='msg '+type;}
function smsgLoading(txt){var e=document.getElementById('settingsMsg');e.innerHTML='<span class="import-spinner"></span> '+(txt||'数据导入中…');e.className='msg loading';}

// ========== 宽泛格式解析 ==========
// 核心理念：不管字段叫什么，自动识别 API URL + 名称对
// API vs 普通网址：必须有 /api/ / provide / php / vod / ?ac= 等特征
function flexibleParseSites(raw){
  var sites=[],seen=new Set();
  function dedupeKey(api){return api.replace(/[\?&]ac=list(?=&|$)/,'').replace(/[\?&]ac=detail(?=&|$)/,'').replace(/[,\}\]"')。，]+$/,'');}
  function add(name,api){var k=dedupeKey(api);if(!seen.has(k)&&k.startsWith('http')){seen.add(k);sites.push({name:name||'未命名',api:k});}}
  function domainName(url){try{return new URL(url).hostname.replace(/^(www|api|m)\./,'');}catch(e){return url.replace(/https?:\/\//,'').split('/')[0];}}
  // 判断是否是API URL（排除普通网址如 detail/官网链接）
  function isApiUrl(u){
    if(!u||!u.startsWith('http')) return false;
    var parts=u.split('/');
    if(parts.length<4) return false; // 裸域名，不是API
    var path=u.substring(parts[0]+'//'+parts[2].length);
    // 必须有明显的API特征路径
    return /\/api\/|\/api\.|provide\/vod|\.php|\/vod\/|tvbox|api_site|\?ac=|\?format=|\?source=/i.test(u);
  }

  // 1) 标准JSON：数组/对象/sites/data/api_site 字段
  try{
    var p=JSON.parse(raw);
    var arr=Array.isArray(p)?p:(p.sites||p.data||p.api_site||(p.api||p.url?[p]:[]));
    if(p.api_site&&!Array.isArray(p.api_site)){arr=[];Object.keys(p.api_site).forEach(function(k){arr.push(p.api_site[k]);});}
    if(!Array.isArray(arr)) arr=[];
    arr.forEach(function(s){if(s&&typeof s==='object'){
      var u=s.api||s.url||s.link||s.source||s.endpoint||s.api_url||s.apiUrl||s.playUrl||s.play_url||'';
      if(typeof u==='string'&&u.startsWith('http')&&isApiUrl(u)){
        var n=s.name||s.site||s.sitename||s.title||s.key||s.domain||s.label||s.alias||'';
        add(n,u);
      }else{
        // 兜底：遍历对象值找第一个API特征URL
        var keys=Object.keys(s);
        for(var ki=0;ki<keys.length;ki++){
          var v=s[keys[ki]];
          if(typeof v==='string'&&v.startsWith('http')&&isApiUrl(v)){
            var nm=s.name||s.site||s.sitename||s.title||s.key||s.label||'';
            add(nm,v);break;
          }
        }
      }
    }});
  }catch(e){}

  // 如果策略1已找到足够站点，跳过重策略直接兜底
  if(sites.length<3){
    // 2) 按对象块配对：每对 {} 内找 API URL + 名称
    var m,reBlock=/\{[\s\S]*?\}/g,blockCount=0;
    while((m=reBlock.exec(raw))!==null&&blockCount<200){
      blockCount++;
      var block=m[0];
      var urlRe=/"([^"]*)"\s*:\s*"(https?:\/\/[^"]+)"/g,m2,urls=[];
      while((m2=urlRe.exec(block))!==null){
        if(isApiUrl(m2[2])) urls.push({key:m2[1],url:m2[2]});
      }
      var nameRe=/"([^"]*)"\s*:\s*"([^"]{1,80})"/g,names=[];
      while((m2=nameRe.exec(block))!==null){
        if(!/^https?:\/\//.test(m2[2])&&!/^[a-z]{2,8}$/i.test(m2[2])&&m2[2].length>1) names.push(m2[2]);
      }
      for(var j=0;j<Math.max(urls.length,names.length);j++){
        if(urls[j]) add(names[j]||domainName(urls[j].url),urls[j].url);
      }
    }
    // 全局收集：全文中所有API URL + 名称配对
    if(sites.length===0){
      var allUrls=[],allNames=[];
      var reUrl=/"([^"]*)"\s*:\s*"(https?:\/\/[^"]+)"/g;
      while((m=reUrl.exec(raw))!==null){if(isApiUrl(m[2])) allUrls.push(m[2]);}
      var reNm=/"([^"]*)"\s*:\s*"([^"]{2,80})"/g;
      while((m=reNm.exec(raw))!==null){if(!/^https?:\/\//.test(m[2])) allNames.push(m[2]);}
      for(var i=0;i<Math.max(allNames.length,allUrls.length);i++){
        if(allUrls[i]) add(allNames[i]||domainName(allUrls[i]),allUrls[i]);
      }
    }

    // 3) 域名key对象: "domain":{"xxx":"name","yyy":"https://..."}
    if(sites.length<3){
      var re3=/"([^"]+)"\s*:\s*\{([^}]+)\}/g;
      while((m=re3.exec(raw))!==null){
        var inner=m[2];
        var urlM=/"([^"]*)"\s*:\s*"(https?:\/\/[^"]+)"/.exec(inner);
        if(urlM&&isApiUrl(urlM[2])){
          var nameM=/"([^"]*)"\s*:\s*"([^"]{1,80})"/.exec(inner);
          add(nameM&&!/^https?:\/\//.test(nameM[2])?nameM[2]:m[1],urlM[2]);
        }
      }
    }

    // 4) 无引号键值: key: https://... + key: 名称
    if(sites.length<5){
      var reUrl2=/\b(?:api|url|link|source|endpoint|api_url|apiUrl|playUrl|play_url)\s*:?\s*(https?:\/\/[^\s\n,}]+)/gi;
      var reName2=/\b(?:name|site|sitename|title|key|domain|label|alias)\s*:?\s*(.+?)(?:\n|$|\b(?:api|url|link|source)\b)/gi;
      var apis2=[],names2=[];
      while((m=reUrl2.exec(raw))!==null){var uu=m[1].replace(/[,\}\]"')]+$/,'');if(isApiUrl(uu)) apis2.push(uu);}
      while((m=reName2.exec(raw))!==null){var v=m[1].trim().replace(/[,\}\]"')]+$/,'');if(v&&v.length<80) names2.push(v);}
      for(var i=0;i<Math.max(names2.length,apis2.length);i++){
        if(apis2[i]) add(names2[i]||domainName(apis2[i]),apis2[i]);
      }
    }
  }

  // 5) 兜底刮URL：只要URL路径包含API特征
  if(sites.length<3){
    var re6=/https?:\/\/[^\s"'<>一-鿿　-〿＀-￯]+/g;
    while((m=re6.exec(raw))!==null){
      var url=m[0].replace(/[,\}\]"')。，]+$/,'');
      if(isApiUrl(url)){var nm=domainName(url);if(nm&&nm.indexOf('.')>0) add(nm,url);}
    }
  }
  // 6) sites太少则更宽：任何带路径的URL都试（至少要有路径深度）
  if(sites.length<2){
    var re7=/https?:\/\/[^\s"'<>]+\/[^\s"'<>]+/g;
    while((m=re7.exec(raw))!==null){
      var u2=m[0].replace(/[,\}\]"')。，]+$/,'');
      if(u2.split('/').length>3) add(domainName(u2),u2);
    }
  }

  return sites;
}

async function loadUrl(){
  var u=document.getElementById('sitesUrl').value.trim();if(!u){smsg('err','请输入URL');return;}
  smsgLoading('正在获取JSON…');
  try{var r=await fetch('/api/fetch?url='+encodeURIComponent(u));var d=await r.json();
    if(d.code===-1){localStorage.removeItem('ms-auth');localStorage.removeItem('ms-login-pwd');closeSettings();document.getElementById('loginOverlay').classList.remove('hidden');document.getElementById('loginMsg').textContent='会话已过期，请重新登录';return;}
    if(d.code!==1){smsg('err',d.msg);return;}localStorage.setItem('ms-sites-url',u);doFlexibleImport(d.data);}
  catch(e){smsg('err','获取失败: '+e.message);}
}
function loadJson(){var j=document.getElementById('sitesJson').value.trim();if(!j){smsg('err','请粘贴JSON');return;}doFlexibleImport(j);}

async function doFlexibleImport(raw){
  var sizeKB=(raw.length/1024).toFixed(0);
  smsgLoading('正在解析 '+sizeKB+'KB 数据…');
  await new Promise(function(r){setTimeout(r,60);});
  var sites=flexibleParseSites(raw);
  if(sites.length===0){smsg('err','未识别到有效站点（需要包含 api 地址）');return;}
  var el=document.getElementById('settingsMsg');

function doPlay(urls,title,idx){
  idx=idx||0;if(idx>=urls.length){alert('所有线路均无法播放');return;}
  var o=document.getElementById('playerOverlay'),v=document.getElementById('videoPlayer');
  o.classList.add('open');applyCinema();
  var srcInfo=urls[idx].site?' <span style="font-weight:400;opacity:.55;font-size:.9em;">['+urls[idx].site+']</span>':'';
  document.getElementById('playerTitle').innerHTML=title+srcInfo+(urls.length>1?' · 线路'+(idx+1)+'/'+urls.length:'');
  if(v._hls){v._hls.destroy();v._hls=null;}
  if(v._playTimer){clearTimeout(v._playTimer);v._playTimer=null;}
  if(v._nextTimer){clearTimeout(v._nextTimer);v._nextTimer=null;}
  if(v._seekTimer){clearInterval(v._seekTimer);v._seekTimer=null;}
  v.onerror=null;v.oncanplay=null;v.ontimeupdate=null;
  var url=urls[idx].url,skipped=false;
  function next(){if(skipped)return;skipped=true;if(v._playTimer){clearTimeout(v._playTimer);v._playTimer=null;}v._seekTo=v.currentTime;v._nextTimer=setTimeout(function(){doPlay(urls,title,idx+1);},400);}
  // 10秒超时：若视频未开始播放，自动跳下一源
  v._playTimer=setTimeout(function(){if(v.paused||v.currentTime<0.5)next();},10000);
  v.ontimeupdate=function(){if(v.currentTime>0.5&&v._playTimer){clearTimeout(v._playTimer);v._playTimer=null;}};
  if(url.indexOf('.m3u8')>=0){
    if(Hls.isSupported()){var h=new Hls({enableWorker:true,lowLatencyMode:false});h.loadSource(url);h.attachMedia(v);v._hls=h;
      h.on(Hls.Events.ERROR,function(e,d){if(d.fatal||d.type===Hls.ErrorTypes.NETWORK_ERROR)next();});
      h.on(Hls.Events.MANIFEST_PARSED,function(){if(v._playTimer){clearTimeout(v._playTimer);v._playTimer=null;}if(v._seekTo>0){v.currentTime=v._seekTo;v._seekTo=0;}});
    }else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=url;}
    else{next();return;}
  }else{v.src=url;}
  // 非HLS.js源：loadedmetadata后同步进度
  if(!v._hls&&v._seekTo>0){var st=v._seekTo;v._seekTo=0;v.addEventListener('loadedmetadata',function seek(){v.currentTime=st;v.removeEventListener('loadedmetadata',seek);});}
  v.onerror=next;v.play().catch(next);
}

// ========== EP NORM + QUALITY ==========
function epNorm(raw){
  var m=raw.match(/第\s*(\d+)\s*集/);
  if(m){var n=parseInt(m[1]);return{key:'ep_'+n,label:String(n),num:n};}
  m=raw.match(/(\d+)/);
  if(m){var n=parseInt(m[1]);return{key:'ep_'+n,label:String(n),num:n};}
  return{key:raw,label:raw,num:99999};
}
function srcQuality(label){
  var l=(label||'').toLowerCase();
  if(/4[kK]|原盘|蓝光|bdrip|bd-rip|1080/.test(l)) return 30;
  if(/超清|高清|hd|720/.test(l)) return 20;
  if(/标清|sd|480/.test(l)) return 5;
  return 15;
}

// ========== BUILD EPS ==========
function buildEps(movie){
  var eps=new Map();
  for(var si=0;si<movie.sources.length;si++){
    var src=movie.sources[si];
    if(src.error) continue;
    var pus=src.play_urls||[];
    for(var pi=0;pi<pus.length;pi++){
      var pu=pus[pi];if(!pu.url) continue;
      var n=epNorm(pu.label||'播放'),q=srcQuality(pu.label);
      if(eps.has(n.key)){
        var ex=eps.get(n.key);
        ex.altUrls.push({url:pu.url,site:src.site,key:src.key,time:src.responseTime||0,quality:q});
        if(n.label.length<=ex.label.length) ex.label=n.label;
      }else{
        eps.set(n.key,{key:n.key,label:n.label,num:n.num,altUrls:[{url:pu.url,site:src.site,key:src.key,time:src.responseTime||0,quality:q}]});
      }
    }
  }
  eps.forEach(function(ep){ep.altUrls.sort(function(a,b){return b.quality-a.quality||a.time-b.time;});});
  return eps;
}
function epSortKey(ep){return ep.num;}

// ========== MERGE ==========
function merge(srcs){
  var map=new Map();
  for(var si=0;si<srcs.length;si++){
    var src=srcs[si];if(!src.results) continue;
    for(var mi=0;mi<src.results.length;mi++){
      var m=src.results[mi],k=norm(m.vod_name);if(!k) continue;
      if(map.has(k)){
        var ex=map.get(k);
        // 去重：同一站点key只保留一次
        var dup=false;for(var di=0;di<ex.sources.length;di++){if(ex.sources[di].key===src.key){dup=true;break;}}
        if(!dup) ex.sources.push({site:src.site,key:src.key,responseTime:src.responseTime||0,play_urls:m.play_urls||[],error:src.error||null});
        ex.vod_year=ex.vod_year||m.vod_year;ex.vod_pic=ex.vod_pic||m.vod_pic;ex.vod_area=ex.vod_area||m.vod_area;
        ex.type_name=ex.type_name||m.type_name;ex.vod_actor=ex.vod_actor||m.vod_actor;ex.vod_director=ex.vod_director||m.vod_director;
        ex.vod_content=ex.vod_content||m.vod_content;
      }else{
        map.set(k,{vod_name:m.vod_name,vod_pic:m.vod_pic||'',vod_year:m.vod_year||'',vod_area:m.vod_area||'',type_name:m.type_name||'',vod_actor:m.vod_actor||'',vod_director:m.vod_director||'',vod_content:m.vod_content||'',sources:[{site:src.site,key:src.key,responseTime:src.responseTime||0,play_urls:m.play_urls||[],error:src.error||null}]});
      }
    }
  }
  return Array.from(map.values()).sort(function(a,b){return b.sources.length-a.sources.length;});
}

var MAX_HISTORY=15;
function getHistory(){try{return JSON.parse(localStorage.getItem('ms-history')||'[]');}catch(e){return[];}}

function addHistory(kw){
  var h=getHistory();
  // 同剧名去重：去掉末尾数字后匹配，后来的覆盖前面的
  var base=kw.replace(/\d+$/,'');
  h=h.filter(function(x){return x!==kw&&x.replace(/\d+$/,'')!==base;});
  h.unshift(kw);saveHistory(h);
}
function delOneHistory(kw,ev){ev.stopPropagation();var h=getHistory().filter(function(x){return x!==kw;});saveHistory(h);renderHistory();}
function clearHistory(){saveHistory([]);renderHistory();}

function getWatchHistory(){try{return JSON.parse(localStorage.getItem('ms-watch')||'[]');}catch(e){return[];}}
function saveWatchHistory(arr){localStorage.setItem('ms-watch',JSON.stringify(arr.slice(0,MAX_WATCH)));}
function addWatchRecord(vodName,epLabel,epNum,timeSec){

  h=h.filter(function(x){return x.vod_name!==vodName;});

function updateWatchTime(vodName,epLabel,epNum,timeSec){

}
function fmtTime(s){var m=Math.floor(s/60),sec=Math.floor(s%60);return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;}
function delOneWatchHistory(idx,ev){ev.stopPropagation();var h=getWatchHistory();h.splice(idx,1);saveWatchHistory(h);renderHistory();}

// ========== SEARCH ==========
var movies=[],statusTimer=null,lastKw='',lastStats=null;
async function doSearch(keepCat){
  var kw=document.getElementById('searchInput').value.trim();if(!kw) return;
  addHistory(kw);
  document.getElementById('resultsArea').innerHTML='';document.getElementById('emptyBox').style.display='none';
  document.getElementById('loadingBox').style.display='block';
  document.getElementById('statusBar').style.display='flex';
  document.getElementById('statusBar').innerHTML='<span class="status-dot" id="statusDot"></span> 搜索中 0/? 站点...';
  document.getElementById('searchBtn').disabled=true;
  if(!keepCat){document.querySelectorAll('#catNav .cat-pill').forEach(function(p){p.classList.remove('active');});activeCat=null;catPage={};}
  var rs=document.getElementById('regionSelect');rs.value='CN';rs.classList.add('active');
  clearTimeout(statusTimer);
  abortAll();searchAbort=new AbortController();
  try{
    var searchSites=[];try{var saved=localStorage.getItem('ms-sites');if(saved){var parsed=JSON.parse(saved);searchSites=Array.isArray(parsed)?parsed:(parsed.sites||[]);}}catch(e){}
    var resp=await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({wd:kw,sites:searchSites}),signal:searchAbort.signal});
    var reader=resp.body.getReader(),decoder=new TextDecoder(),buffer='',allSrcData=[];
    while(true){
      var chunk=await reader.read();if(chunk.done) break;
      buffer+=decoder.decode(chunk.value,{stream:true});var lines=buffer.split('\n');buffer=lines.pop();
      for(var i=0;i<lines.length;i++){
        var line=lines[i];if(!line.trim()) continue;
        var msg=JSON.parse(line);
        if(msg.type==='result'){
          allSrcData.push(msg.data);movies=merge(allSrcData);
          document.getElementById('statusBar').innerHTML='<span class="status-dot"></span> 搜索中 '+msg.completed+'/'+msg.total+' 站点 · '+movies.length+' 部';
          var shouldRender=msg.completed===1||msg.completed%5===0||msg.completed===msg.total;
          if(shouldRender&&movies.length>0){
            document.getElementById('loadingBox').style.display='none';
            document.getElementById('emptyBox').style.display='none';
            render(kw,{completed:msg.completed,total:msg.total});
          }
        }else if(msg.type==='done'){
          document.getElementById('loadingBox').style.display='none';
          if(msg.error){document.getElementById('statusBar').innerHTML='<span class="status-dot err"></span> '+msg.error;document.getElementById('searchBtn').disabled=false;return;}
          var sd=document.getElementById('statusDot');if(sd) sd.className=msg.success>0?'status-dot ok':'status-dot err';
          document.getElementById('statusBar').innerHTML=(msg.success>0?'<span class="status-dot ok"></span> ':'<span class="status-dot err"></span> ')+msg.success+'站点成功, '+msg.fail+'失败, 共'+msg.totalMovies+'条 · '+(msg.totalTime/1000).toFixed(1)+'s';
          document.getElementById('searchBtn').disabled=false;
          statusTimer=setTimeout(function(){document.getElementById('statusBar').style.display='none';},3000);
          if(movies.length===0){document.getElementById('emptyBox').style.display='block';document.getElementById('emptyBox').innerHTML='<p style="font-size:40px;color:var(--text3);"><i data-lucide=\"search-x\"></i></p><p>未找到\"'+esc(kw)+'\"</p><p style=\"font-size:12px;margin-top:4px;\">请确认已加载站点（右上角 <i data-lucide=\"settings\"></i>）</p>';lucide.createIcons();}
          else{lastKw=kw;lastStats={completed:msg.total,total:msg.total,done:true,success:msg.success,fail:msg.fail,totalMovies:msg.totalMovies,totalTime:msg.totalTime};render(lastKw,lastStats);enrichTmdb(kw);}
        }
      }
    }
  }catch(e){if(e.name==='AbortError')return;document.getElementById('loadingBox').style.display='none';document.getElementById('statusBar').innerHTML='<span class="status-dot err"></span> 错误: '+e.message;document.getElementById('searchBtn').disabled=false;}
}

function render(kw,stats){
  var header='';
  if(stats&&stats.done){header='<div class="results-header">"<b>'+esc(kw||lastKw)+'</b>" — '+(stats.totalMovies||movies.length)+'条 · '+(stats.success||'?')+'/'+(stats.total||'?')+'站点 · <b>'+(stats.totalTime?(stats.totalTime/1000).toFixed(1):'?')+'s</b></div>';}
  else if(stats){header='<div class="results-header">"<b>'+esc(kw||lastKw)+'</b>" — '+(stats.completed||'?')+'/'+(stats.total||'?')+' 站点 · '+movies.length+' 部</div>';}
  var html=header+'<div id="resultsCards">';
  for(var mi=0;mi<movies.length;mi++){
    var movie=movies[mi];
    var eps=buildEps(movie),epList=[];eps.forEach(function(ep){epList.push(ep);});
    epList.sort(function(a,b){return epSortKey(a)-epSortKey(b);});
    var workingSrcs=[];
    for(var si=0;si<movie.sources.length;si++){var s=movie.sources[si];if(!s.error&&s.play_urls&&s.play_urls.length>0) workingSrcs.push(s);}
    var fastest=null;
    if(workingSrcs.length>0){fastest=workingSrcs[0];for(var wi=1;wi<workingSrcs.length;wi++){if((workingSrcs[wi].responseTime||9999)<(fastest.responseTime||9999)) fastest=workingSrcs[wi];}}

    html+='<div class="movie-card"><div class="movie-top"><div class="poster-wrap">';
    if(movie.vod_pic){
      html+='<img class="movie-poster" src="'+escUrl(movie.vod_pic)+'" loading="lazy" onclick="event.stopPropagation();showPoster(\''+escUrl(movie.vod_pic)+'\')" style="cursor:pointer" onerror="var d=document.createElement(\'div\');d.className=\'movie-poster poster-fb\';d.innerHTML=\'<i data-lucide=&quot;image-off&quot;></i>\';this.replaceWith(d);lucide.createIcons();">';
    }else{html+='<div class="movie-poster poster-fb"><i data-lucide="image-off"></i></div>';}
    html+=movie.tmdb?'<span class="poster-rating'+(parseFloat(movie.tmdb.rating)>=10?' wide':'')+'">'+movie.tmdb.rating+'</span>':'';
    html+='</div><div class="movie-info"><div class="movie-title">'+esc(movie.vod_name)+(movie.tmdbLoading?'<span class="tmdb-badge" style="opacity:.5;"><i data-lucide="loader"></i> TMDB</span>':'')+'</div>';
    html+='<div class="movie-meta">'+(movie.vod_year?'<span><i data-lucide="calendar"></i> '+esc(movie.vod_year)+'</span>':'')+(movie.vod_area?'<span><i data-lucide="globe"></i> '+esc(movie.vod_area)+'</span>':'')+(movie.type_name?'<span><i data-lucide="folder"></i> '+esc(movie.type_name)+'</span>':'')+'</div>';
    if(movie.vod_director) html+='<div class="movie-meta" style="margin-top:2px;"><i data-lucide="clapperboard"></i> 导演：'+esc(movie.vod_director)+'</div>';
    if(movie.vod_actor) html+='<div class="movie-meta" style="margin-top:2px;"><i data-lucide="users"></i> 主演：'+esc(movie.vod_actor)+'</div>';
    if(movie.vod_content) html+='<div class="movie-meta" style="margin-top:4px;line-height:1.5;"><i data-lucide="book-open"></i> '+esc(movie.vod_content).substring(0,150)+(movie.vod_content.length>150?'...':'')+'</div>';

var prefSrcKey={};
function setPrefSrc(mi,key){prefSrcKey[mi]=key||null;}

function playEp(urlsJson,title,mi,btn){
  document.querySelectorAll('.ep-btn.now').forEach(function(b){b.classList.remove('now');});
  if(btn) btn.classList.add('now');
  var urls=JSON.parse(urlsJson.replace(/&quot;/g,'"'));
  if(prefSrcKey[mi]){
    var pk=prefSrcKey[mi],arr=[];urls.forEach(function(u){if(u.key===pk) arr.push(u);});urls.forEach(function(u){if(u.key!==pk) arr.push(u);});urls=arr;
  }
  // 保存观影记录 — 用 lastIndexOf 防止电影名含 ' - ' 被切断
  var idx=title.lastIndexOf(' - '),vodName=idx>=0?title.substring(0,idx):title,epLabel=idx>=0?title.substring(idx+3):'';
  var epNum=0;var m=epLabel.match(/(\d+)/);if(m) epNum=parseInt(m[1]);
  currentWatch={vodName:vodName,epLabel:epLabel,epNum:epNum};
  addWatchRecord(vodName,epLabel,epNum,0);
  // 启动播放时间追踪
  if(watchTimer) clearInterval(watchTimer);
  watchTimer=setInterval(function(){
    var v=document.getElementById('videoPlayer');
    if(v&&!v.paused&&v.currentTime>0&&currentWatch){
      updateWatchTime(currentWatch.vodName,currentWatch.epLabel,currentWatch.epNum,Math.floor(v.currentTime));
    }
  },5000);
  // 手动换线路：同步当前播放进度
  var pv=document.getElementById('videoPlayer');
  if(document.getElementById('playerOverlay').classList.contains('open')&&pv&&pv.currentTime>1) pv._seekTo=pv.currentTime;
  doPlay(urls,title);
}

function reverseEps(btn){
  var grid=btn.closest('.ep-section').querySelector('.ep-grid');
  var items=Array.from(grid.children);items.reverse().forEach(function(el){grid.appendChild(el);});
  var rev=btn.classList.toggle('reversed');
  btn.innerHTML=rev?'<i data-lucide="arrow-up-down"></i> 正序':'<i data-lucide="arrow-up-down"></i> 倒序';
  lucide.createIcons();
}

var catPage={},activeCat=null,catTimer=null,catLoading=false,catCache={};
var CAT_CACHE_TTL=12*60*60*1000;
function stripItem(o){return{title:o.title||o.name||'',poster_path:o.poster_path||'',vote_average:o.vote_average,release_date:o.release_date||'',first_air_date:o.first_air_date||''};}
function saveCatCache(cat,region,allItems,lastPage){
  var key=cat+'_'+region+'_v2';
  allItems=allItems.map(stripItem);
  catCache[key]={allItems:allItems,lastPage:lastPage,time:Date.now()};
  var o={};
  try{
    var raw=localStorage.getItem('ms-cat-cache');if(raw) o=JSON.parse(raw);
  }catch(e){}
  o[key]={allItems:allItems,lastPage:lastPage,time:Date.now()};
  try{localStorage.setItem('ms-cat-cache',JSON.stringify(o));}catch(e){}
}
function getCached(cat,region){
  var key=cat+'_'+region+'_v2';
  if(catCache[key]) return catCache[key];
  try{
    var raw=localStorage.getItem('ms-cat-cache');if(!raw)return null;
    var o=JSON.parse(raw),entry=o[key];
    if(entry&&Date.now()-entry.time<CAT_CACHE_TTL){
      // 兼容旧格式 {items,page} → 转为新格式 {allItems,lastPage}
      if(!entry.allItems&&entry.items){entry.allItems=entry.items;entry.lastPage=entry.page||1;}
      catCache[key]=entry;return entry;
    }
  }catch(e){}
  return null;
}
var SERIES_CATS={marvel:1,dc:1,starwars:1,harrypotter:1,jurassic:1,bond:1,lotr:1};

function tmdbFetch(path,timeout,extSignal){var sep=path.indexOf('?')>=0?'&':'?';var url=TMDB+path+sep+'pwd='+(localStorage.getItem('ms-login-pwd')||'');var ctrl=new AbortController();var timer=setTimeout(function(){ctrl.abort();},timeout);var signal=extSignal||ctrl.signal;return fetch(url,{signal:signal}).finally(function(){clearTimeout(timer);});}

async function loadCategory(cat,pill,forceReload){

  // 检查缓存：首页只显示前20条（界面一致），更多优先从缓存切片
  var cached=getCached(cat,region);
  if(cached&&cached.allItems&&cached.allItems.length>0){
    var PER_PAGE=20,start=(page-1)*PER_PAGE,end=start+PER_PAGE;
    if(cached.allItems.length>=start){
      var pageItems=cached.allItems.slice(start,Math.min(end,cached.allItems.length));

  }

  }
  document.getElementById('statusBar').style.display='flex';
  document.getElementById('statusBar').innerHTML='<span class="status-dot"></span> 加载中...';
  var t0=Date.now();
  try{
    var cfg=CAT_PARAMS[cat];
    // 自定义分类：搜TMDB关键词ID，用关键词筛选系列作品；搜不到则搜影片名
    // Collection系列（007等，精确）
    if(cfg.collection){
      var res=await tmdbFetch('/collection/'+cfg.collection+'?language=zh-CN',10000,sig);

      catTimer=setTimeout(function(){document.getElementById('statusBar').style.display='none';},3000);
      if(page===1&&items.length>0){saveCatCache(cat,region,items,Math.ceil(items.length/20));}
      catLoading=false;
      if(items.length===0){
        document.getElementById('loadingBox').style.display='none';
        document.getElementById('emptyBox').style.display='block';
        document.getElementById('emptyBox').innerHTML='<p style="font-size:40px;color:var(--text3);"><i data-lucide=\"search-x\"></i></p><p>请重新点击分类</p>';
        lucide.createIcons();

      }
      // 分页（客户端切分）
      var perPage=20,start=(page-1)*perPage,end=start+perPage;
      var pageItems=items.slice(start,end);
      // Convert to same format as discover results
      var data={results:pageItems,total_results:items.length};

      if(pageItems.length===0) return;
      renderCatGrid(pageItems,cat,isMore);
      return;
    }
    // 影片名搜索系列（星球大战/哈利波特等）
    if(cfg.search){
      var sExtra='sort_by='+cfg.sort;
      if(region&&!SERIES_CATS[cat]) sExtra+='&with_origin_country='+region;
      if(cfg.type==='movie') sExtra+='&primary_release_date.lte='+TODAY;
      var res=await tmdbFetch('/search/movie?query='+encodeURIComponent(cfg.search)+'&language=zh-CN&'+sExtra+'&page='+page,10000,sig);

      if(data.results){data.results=data.results.filter(function(r){return (r.release_date||'')<=TODAY;});data.results.sort(function(a,b){return (b.release_date||'')>(a.release_date||'')?1:-1;});}
    }else if(cfg.keyword){

      }else{
        var sExtra='sort_by='+cfg.sort;
        if(region&&!SERIES_CATS[cat]) sExtra+='&with_origin_country='+region;
        if(cfg.type==='movie') sExtra+='&primary_release_date.lte='+TODAY;
        var res=await tmdbFetch('/search/movie?query='+encodeURIComponent(cfg.keyword)+'&language=zh-CN&'+sExtra+'&page='+page,10000,sig);

      var url='/discover/'+cfg.type+'?language=zh-CN&'+extra+'&page='+page;
      var res=await tmdbFetch(url,10000,sig);var data=await res.json();
    }
    var items=data.results||[];
    if(!isMore) document.getElementById('loadingBox').style.display='none';
    var elapsed=Date.now()-t0;
    var regionText=region?' · '+document.getElementById('regionSelect').selectedOptions[0]?.textContent:'';
    document.getElementById('statusBar').innerHTML='<span class="status-dot ok"></span> '+pill.textContent.trim()+regionText+' · 第'+page+'页 · '+elapsed+'ms';
    catTimer=setTimeout(function(){document.getElementById('statusBar').style.display='none';},3000);
    // 缓存第一页结果
    // 追加到缓存（新条目合并去重)
    if(items.length>0){
      var ck=cat+'_'+region+'_v2',exist=catCache[ck];
      var all=exist&&exist.allItems?exist.allItems.concat(items):items;
      saveCatCache(cat,region,all,page);
    }
    catLoading=false;
    if(items.length===0){
      document.getElementById('loadingBox').style.display='none';
      document.getElementById('emptyBox').style.display='block';

      lucide.createIcons();
      catTimer=setTimeout(function(){document.getElementById('statusBar').style.display='none';},3000);
      return;
    }
    renderCatGrid(items,cat,isMore);
  }catch(e){
    if(catPage[cat]&&catPage[cat]>0) catPage[cat]--;
    if(e.name==='AbortError'){catLoading=false;return;}
    document.getElementById('loadingBox').style.display='none';
    document.getElementById('statusBar').innerHTML='<span class="status-dot err"></span> 请重新点击分类';
    catTimer=setTimeout(function(){document.getElementById('statusBar').style.display='none';},4000);

          if(data.results&&data.results.length>0){var tm=data.results[0],date=tm.release_date||tm.first_air_date||'';m.tmdb={rating:Number(tm.vote_average).toFixed(1),overview:tm.overview,year:date.substring(0,4),type:tm.media_type==='tv'?'剧集':'电影'};}
        }catch(e){}finally{m.tmdbLoading=false;resolve();}

  if(gotAny&&lastStats) render(lastKw,lastStats);

  if(!name||!name.trim()) return;name=name.trim();
  var catKey='custom_'+Date.now();
  CAT_PARAMS[catKey]={type:'movie',sort:'primary_release_date.desc',extra:'',keyword:name};
  createCustomPill(catKey,name);saveCustomCats();loadCategory(catKey,document.querySelector('[data-cat="'+catKey+'"]'));
}
function createCustomPill(catKey,name){
  var pill=document.createElement('button');pill.className='cat-pill custom';pill.dataset.cat=catKey;pill.draggable=true;
  pill.innerHTML=name+'<span class="cat-pill-del" onclick="event.stopPropagation();deleteCustomCat(this.parentElement)">×</span>';
  document.getElementById('addCatBtn').before(pill);
}
function deleteCustomCat(pill){
  var cat=pill.dataset.cat;delete CAT_PARAMS[cat];
  if(activeCat===cat){activeCat=null;document.getElementById('resultsArea').innerHTML='';}
  pill.remove();saveCustomCats();
}
function saveCustomCats(){
  var customs=[];document.querySelectorAll('.cat-pill.custom').forEach(function(p){customs.push({cat:p.dataset.cat,name:p.childNodes[0].textContent.trim()});});
  localStorage.setItem('ms-custom-cats',JSON.stringify(customs));
}
function restoreCustomCats(){
  try{var saved=JSON.parse(localStorage.getItem('ms-custom-cats')||'[]');var presets={marvel:1,dc:1,starwars:1,harrypotter:1,jurassic:1,bond:1,lotr:1,trending_movie:1,trending_tv:1,top_rated:1,now_playing:1,action:1,comedy:1,scifi:1,horror:1,doc:1};saved=saved.filter(function(o){return !presets[o.cat];});saved.forEach(function(o){CAT_PARAMS[o.cat]={type:'movie',sort:'primary_release_date.desc',extra:'',keyword:o.name};createCustomPill(o.cat,o.name);});localStorage.setItem('ms-custom-cats',JSON.stringify(saved));}catch(e){}
}

// ========== CAT DRAG ==========
function initCatDrag(){
  var nav=document.getElementById('catNav'),saved=localStorage.getItem('ms-cat-order');
  if(saved){var order=JSON.parse(saved),addBtn=document.getElementById('addCatBtn');order.forEach(function(cat){var pill=nav.querySelector('[data-cat="'+cat+'"]');if(pill) nav.insertBefore(pill,addBtn);});}
  var dragPill=null;
  nav.addEventListener('dragstart',function(e){
    dragPill=e.target.closest('.cat-pill');if(!dragPill||dragPill.classList.contains('cat-pill-add')){e.preventDefault();return;}
    dragPill.classList.add('dragging');e.dataTransfer.effectAllowed='move';
  });
  nav.addEventListener('dragend',function(){
    if(dragPill){dragPill.classList.remove('dragging');document.querySelectorAll('.cat-pill.drag-over').forEach(function(p){p.classList.remove('drag-over');});
    var order=Array.from(nav.querySelectorAll('.cat-pill[data-cat]')).map(function(p){return p.dataset.cat;});localStorage.setItem('ms-cat-order',JSON.stringify(order));dragPill=null;}
  });
  nav.addEventListener('dragover',function(e){e.preventDefault();var pill=e.target.closest('.cat-pill');if(pill&&pill!==dragPill){document.querySelectorAll('.cat-pill.drag-over').forEach(function(p){p.classList.remove('drag-over');});pill.classList.add('drag-over');}});
  nav.addEventListener('drop',function(e){e.preventDefault();var target=e.target.closest('.cat-pill');if(target&&target!==dragPill&&dragPill){var rect=target.getBoundingClientRect();if(e.clientX<rect.left+rect.width/2){nav.insertBefore(dragPill,target);}else{nav.insertBefore(dragPill,target.nextSibling);}}document.querySelectorAll('.cat-pill.drag-over').forEach(function(p){p.classList.remove('drag-over');});});
}
initCatDrag();restoreCustomCats();

// ========== CAT SWIPE (移动端跟手滑动切换分类) ==========
(function initSwipe(){
  var startX=0,startY=0,dragging=false,area=document.getElementById('resultsArea'),pills=[],nav=document.getElementById('catNav');
  var SWIPE_THRESHOLD=60,MAX_DRAG=120;
  function getPills(){return Array.from(nav.querySelectorAll('.cat-pill[data-cat]'));}
  function curIdx(){for(var i=0;i<pills.length;i++){if(pills[i].dataset.cat===activeCat) return i;}return -1;}
  function restorePills(){pills.forEach(function(p){p.style.transform='';p.style.opacity='';});}

  document.addEventListener('touchstart',function(e){
    // 不拦截分类栏上的触摸（保留原生滚动）
    if(e.target.closest('#catNav')||e.target.closest('.cat-bar')) return;
    if(!activeCat||catLoading||e.touches.length!==1) return;
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=true;
    pills=getPills();area.style.transition='none';
    document.body.style.overflow='hidden'; // 锁定页面防止抖动
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(!dragging||catLoading) return;
    var dx=e.touches[0].clientX-startX,dy=e.touches[0].clientY-startY;
    if(Math.abs(dy)>Math.abs(dx)*1.3){dragging=false;area.style.transform='';restorePills();document.body.style.overflow='';return;}
    var clamped=Math.max(-MAX_DRAG,Math.min(MAX_DRAG,dx));
    area.style.transform='translateX('+clamped+'px)';
    // 滑动 cat-nav 到目标分类位置（使用 scrollLeft）
    var idx=curIdx();if(idx<0) return;
    var targetIdx=dx<0?idx+1:idx-1;
    if(targetIdx>=0&&targetIdx<pills.length){
      var target=pills[targetIdx];
      nav.scrollLeft=target.offsetLeft-nav.offsetWidth/2+target.offsetWidth/2;
      pills.forEach(function(p,i){p.style.transform='';p.style.opacity='';});
      target.style.transform='scale(1.05)';target.style.opacity='0.7';
    }
  },{passive:true});

  document.addEventListener('touchend',function(e){
    if(!dragging||catLoading){dragging=false;restorePills();document.body.style.overflow='';return;}
    dragging=false;restorePills();document.body.style.overflow='';
    var dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)<SWIPE_THRESHOLD||Math.abs(dy)>Math.abs(dx)*1.2){
      area.style.transition='transform .25s ease-out';area.style.transform='translateX(0)';return;
    }
    var idx=curIdx();if(idx<0){area.style.transform='';return;}
    var nextIdx=dx<0?idx+1:idx-1;
    if(nextIdx<0||nextIdx>=pills.length){area.style.transition='transform .25s ease-out';area.style.transform='translateX(0)';return;}
    // 飞出旧内容 + 加载新分类
    var outX=dx<0?-area.offsetWidth:area.offsetWidth;
    area.style.transition='transform .25s ease-out';
    area.style.transform='translateX('+outX+'px)';
    setTimeout(function(){
      area.style.transition='none';area.style.transform='translateX(0)';
      catPage={};loadCategory(pills[nextIdx].dataset.cat,pills[nextIdx]);
    },250);
  },{passive:true});
})();

(function init(){
  var saved=localStorage.getItem('ms-sites');
  if(saved){
    // 本地直接解锁（无需等服务器，秒开界面）
    try{
      var parsed=JSON.parse(saved);
      var sites=Array.isArray(parsed)?parsed:(parsed.sites||[]);
      if(sites.length>0){updateBadge(sites.length);unlockSite();}
    }catch(e){}
    // 后台静默同步服务器（刷新站点列表，不阻塞界面）
    try{
      fetch('/api/sites/load',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({json:saved})})
      .then(function(r){return r.json();}).then(function(d){if(d.code===1){updateBadge(d.total);updateSiteList(d.data);}})
      .catch(function(){/* 网络波动不影响已缓存数据 */});
    }catch(e){}
  }
  var savedUrl=localStorage.getItem('ms-sites-url');
  if(savedUrl) document.getElementById('sitesUrl').value=savedUrl;
  if(sitesLocked) lockSite();
  // 清洗历史记录中的旧重复数据（仅启动执行一次）
  (function cleanDupHistory(){
    try{
      var h=JSON.parse(localStorage.getItem('ms-history')||'[]');
      if(h.length>1){var seen={},clean=[];for(var i=0;i<h.length;i++){var b=h[i].replace(/\d+$/,'');if(!seen[b]){seen[b]=true;clean.push(h[i]);}}if(clean.length!==h.length) localStorage.setItem('ms-history',JSON.stringify(clean));}
    }catch(e){}

    }catch(e){}
  })();
  applyCinema();
  lucide.createIcons();
  var stBtn=document.getElementById('scrollTopBtn');
  window.addEventListener('scroll',function(){
    stBtn.classList.toggle('show',window.scrollY>400);
  });
})();
